name: flutter_cake_web
description: "3D Cake Designer — Flutter Web (HtmlElementView + vanilla Three.js)"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Web-only image picker
  image_picker: ^1.1.2
  image_picker_for_web: ^3.0.4
  js: ^0.7.2

  responsive_framework: ^1.5.1
  web: ^1.1.1
  webview_flutter: ^4.13.1
  http: ^1.2.0
  flutter_bloc: ^9.1.1
  device_preview: ^1.3.1




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  device_preview: ^1.3.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/
    - web/glow.png

  fonts:
    - family: Tajawal
      fonts:
        - asset: fonts/Tajawal-Regular.ttf
        - asset: fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: fonts/Tajawal-Light.ttf
          weight: 300



  # ===== تغيير الأيقونة =====
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/logo.png"
