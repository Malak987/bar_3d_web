  <!-- ═══════════════════════════════════════════════════════
       ★ HTML Splash Screen — يبان فوراً قبل أي حاجة
       ═══════════════════════════════════════════════════════ -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #EDF5F3;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    }

    /* ── Splash container ────────────────────────────────── */
    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #EDF5F3;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }
    #app-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ── Logo (circular with teal border + pulse) ──────── */
    .splash-logo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid #0D9E8A;
      box-shadow:
        0 0 0 6px rgba(13, 158, 138, 0.12),
        0 12px 30px rgba(3, 46, 63, 0.18);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      animation: splashLogoPulse 2.2s ease-in-out infinite;
    }
    .splash-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .splash-logo .fallback {
      font-size: 56px;
      line-height: 1;
    }

    @keyframes splashLogoPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow:
          0 0 0 6px rgba(13, 158, 138, 0.12),
          0 12px 30px rgba(3, 46, 63, 0.18);
      }
      50% {
        transform: scale(1.04);
        box-shadow:
          0 0 0 12px rgba(13, 158, 138, 0.18),
          0 18px 40px rgba(3, 46, 63, 0.22);
      }
    }

    /* ── App title ────────────────────────────────────────── */
    .splash-title {
      margin-top: 24px;
      color: #032E3F;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.3px;
    }
    .splash-subtitle {
      margin-top: 6px;
      color: #6B8F8A;
      font-size: 12px;
      font-weight: 500;
    }

    /* ── Circular loader ──────────────────────────────────── */
    .splash-loader {
      margin-top: 28px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 3px solid rgba(13, 158, 138, 0.18);
      border-top-color: #0D9E8A;
      animation: splashSpin 0.9s linear infinite;
    }
    @keyframes splashSpin { to { transform: rotate(360deg); } }

    /* ── Loading text (fades in) ──────────────────────────── */
    .splash-loading-text {
      margin-top: 18px;
      color: #0A7A6A;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      opacity: 0;
      animation: splashFadeText 0.6s ease 0.4s forwards;
    }
    @keyframes splashFadeText { to { opacity: 1; } }
  </style>
</head>

<!-- ═══════════════════════════════════════════════════════
     ★ Splash control
     ─────────────────────────────────────────────────────
     يخفي الـ splash لما:
       1. window.cakeDesigner جاهز (JS bridge)
       2. Flutter رسم أول إطار (DOM في <flt-glass-pane>)
       3. حد أدنى 1500ms (يمنع وميض سريع)
       4. حد أقصى 8000ms (fail-safe)
     ═══════════════════════════════════════════════════════ -->
<script>
  (function () {
    var MIN_MS = 1500;
    var MAX_MS = 8000;
    var startTime = Date.now();
    var hidden = false;

    function hideSplash() {
      if (hidden) return;
      var elapsed = Date.now() - startTime;
      var wait = Math.max(0, MIN_MS - elapsed);
      setTimeout(function () {
        if (hidden) return;
        hidden = true;
        var el = document.getElementById('app-splash');
        if (el) {
          el.classList.add('hidden');
          // remove from DOM after fade-out
          setTimeout(function () {
            if (el && el.parentNode) el.parentNode.removeChild(el);
            // restore body scroll/overflow
            document.body.style.overflow = '';
          }, 600);
        }
      }, wait);
    }

    // ─── Detect readiness ─────────────────────────────────
    // Flutter Web بيضيف <flt-glass-pane> أول ما يرسم أول إطار
    function isFlutterReady() {
      return document.querySelector('flt-glass-pane') !== null
          || document.querySelector('flutter-view') !== null;
    }

    function isJsReady() {
      return typeof window.cakeDesigner !== 'undefined';
    }

    // expose يدوياً لو محتاج
    window.hideSplash = hideSplash;

    // poll loop
    var attempts = 0;
    var pollTimer = setInterval(function () {
      attempts++;
      if (isJsReady() && isFlutterReady()) {
        clearInterval(pollTimer);
        hideSplash();
      } else if (attempts > 80) {  // ~8 ثوان polling
        clearInterval(pollTimer);
        hideSplash();
      }
    }, 100);

    // absolute fail-safe
    setTimeout(hideSplash, MAX_MS);
  })();
</script>
